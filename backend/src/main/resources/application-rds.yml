spring:
  datasource:
    url: jdbc:mysql://murmur-database.ch6so6m66mra.ap-northeast-2.rds.amazonaws.com:3306/${DB_NAME:murmur_app}?serverTimezone=Asia/Seoul&characterEncoding=UTF-8&useSSL=false&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:admin}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    defer-datasource-initialization: true
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

  sql:
    init:
      mode: always

  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: 6379

jwt:
  secret: ${JWT_SECRET:change-this-secret-key-to-a-long-random-value}
  access-token-expiration-ms: ${JWT_ACCESS_TOKEN_EXPIRATION_MS:1800000}
  refresh-token-expiration-ms: ${JWT_REFRESH_TOKEN_EXPIRATION_MS:1209600000}
