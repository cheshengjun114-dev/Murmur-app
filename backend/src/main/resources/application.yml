spring:
  datasource:
    url: jdbc:mysql://murmur-database.ch6so6m66mra.ap-northeast-2.rds.amazonaws.com:3306/murmur_app?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: admin
    password: murmur1234
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    defer-datasource-initialization: true
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: 6379

  sql:
    init:
      mode: always

jwt:
  secret: ${JWT_SECRET:change-this-secret-key-to-a-long-random-value}
  access-token-expiration-ms: ${JWT_ACCESS_TOKEN_EXPIRATION_MS:1800000}
  refresh-token-expiration-ms: ${JWT_REFRESH_TOKEN_EXPIRATION_MS:1209600000}

server:
  port: 8080
