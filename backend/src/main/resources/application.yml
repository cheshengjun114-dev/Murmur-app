spring:
  application:
    name: murmur-backend

  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/murmur?serverTimezone=Asia/Seoul&characterEncoding=UTF-8}
    username: ${DB_USERNAME:murmur}
    password: ${DB_PASSWORD:murmur}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    defer-datasource-initialization: true
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

  data:
    redis:
      host: localhost
      port: 6379

  sql:
    init:
      mode: always

jwt:
  secret: ${JWT_SECRET:change-this-secret-key-to-a-long-random-value}
  access-token-expiration-ms: ${JWT_ACCESS_TOKEN_EXPIRATION_MS:1800000}
  refresh-token-expiration-ms: ${JWT_REFRESH_TOKEN_EXPIRATION_MS:1209600000}

server:
  port: 8080
