spring:
  datasource:
    url: jdbc:h2:mem:murmur-test;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    defer-datasource-initialization: true
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

  sql:
    init:
      mode: always

  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: 6379

jwt:
  secret: test-secret-key-must-be-long-enough-for-hs256-signing
  access-token-expiration-ms: 1800000
  refresh-token-expiration-ms: 1209600000
